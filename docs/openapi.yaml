openapi: 3.1.0
info:
  title: Example Async API
  version: 0.1.0
  description: >
    Contract-first пример для генерации FastAPI сервера/моделей.
servers:
  - url: https://api.example.local
tags:
  - name: meta
  - name: auth
  - name: items

x-request-id-header: X-Request-Id

paths:
  /health:
    get:
      tags: [meta]
      operationId: health
      summary: Liveness/readiness probe
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Issue access token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Token issued
          headers:
            X-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401":
          $ref: "#/components/responses/Error401"
        "429":
          $ref: "#/components/responses/Error429"

  /items:
    get:
      tags: [items]
      operationId: listItems
      summary: List items
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 200
      responses:
        "200":
          description: Page of items
          headers:
            X-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemListResponse" }
        "401":
          $ref: "#/components/responses/Error401"
    post:
      tags: [items]
      operationId: createItem
      summary: Create item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ItemCreateRequest" }
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "400":
          $ref: "#/components/responses/Error400"
        "401":
          $ref: "#/components/responses/Error401"
        "409":
          $ref: "#/components/responses/Error409"

  /items/{itemId}:
    get:
      tags: [items]
      operationId: getItem
      summary: Get item by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item
          headers:
            X-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "401":
          $ref: "#/components/responses/Error401"
        "404":
          $ref: "#/components/responses/Error404"
    patch:
      tags: [items]
      operationId: patchItem
      summary: Partial update
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ItemPatchRequest" }
      responses:
        "200":
          description: Updated
          headers:
            X-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "400":
          $ref: "#/components/responses/Error400"
        "401":
          $ref: "#/components/responses/Error401"
        "404":
          $ref: "#/components/responses/Error404"
        "409":
          $ref: "#/components/responses/Error409"
    delete:
      tags: [items]
      operationId: deleteItem
      summary: Delete item
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "204":
          description: Deleted
          headers:
            X-Request-Id:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Error401"
        "404":
          $ref: "#/components/responses/Error404"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9_-]{8,64}$"
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    Error400:
      description: Bad request
      headers:
        X-Request-Id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            bad_request:
              value:
                error:
                  code: BAD_REQUEST
                  message: invalid payload
                  details:
                    - field: name
                      issue: minLength
                requestId: "req_01H..."
    Error401:
      description: Unauthorized
      headers:
        X-Request-Id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Error404:
      description: Not found
      headers:
        X-Request-Id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Error409:
      description: Conflict
      headers:
        X-Request-Id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Error429:
      description: Too many requests
      headers:
        X-Request-Id:
          schema: { type: string }
        Retry-After:
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [ok, version]
      properties:
        ok: { type: boolean }
        version: { type: string }
        uptimeSeconds:
          type: number
          minimum: 0

    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 128
        password:
          type: string
          minLength: 1
          maxLength: 256

    TokenResponse:
      type: object
      additionalProperties: false
      required: [accessToken, tokenType, expiresIn]
      properties:
        accessToken:
          type: string
          minLength: 1
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          minimum: 1

    Item:
      type: object
      additionalProperties: false
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          pattern: "^[a-zA-Z0-9_-]{8,64}$"
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ItemCreateRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000

    ItemPatchRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
      minProperties: 1

    ItemListResponse:
      type: object
      additionalProperties: false
      required: [items, limit, offset, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Item" }
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error, requestId]
      properties:
        requestId:
          type: string
          description: Correlation id (same as X-Request-Id)
        error:
          $ref: "#/components/schemas/ErrorObject"

    ErrorObject:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code
        message:
          type: string
        details:
          type: array
          items: { $ref: "#/components/schemas/ErrorDetail" }

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [field, issue]
      properties:
        field: { type: string }
        issue: { type: string }
        meta:
          type: object
          additionalProperties: true